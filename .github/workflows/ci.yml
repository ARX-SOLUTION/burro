name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # @burro/shared and @burro/ui resolve via dist/; build before downstream
      # typechecks so backend/students can find type declarations.
      - run: pnpm --filter @burro/shared build
      - run: pnpm --filter @burro/ui build
      - run: pnpm -r typecheck
      - run: pnpm --filter @burro/backend test
